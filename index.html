<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="QueesAI is a proactive learning AI that guides you through the educational process, making learning a continuous, seamless journey wherever you are.">
  <title>QueesAI - Learn with AI. Learn about AI.</title>
  
  <!-- Modern Geometric Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    /* Design System Tokens (Light Mode Focus) */
    :root {
      --bg-dark: #f8fafc;
      --border-color: rgba(15, 23, 42, 0.08);
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      
      --accent-purple: #8b5cf6;
      --accent-cyan: #0ea5e9;
      --accent-gradient: linear-gradient(135deg, #8b5cf6 0%, #0ea5e9 100%);
      
      --font-sans: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --transition-smooth: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Reset & Base */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: var(--font-sans);
      background-color: var(--bg-dark);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      position: relative;
    }

    /* Background Ambient Glows (Subtle Light Mode) */
    .glow-container {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 1400px;
      height: 100%;
      overflow: hidden;
      z-index: -1;
      pointer-events: none;
    }

    .glow-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(160px);
      opacity: 0.08;
    }

    .glow-center {
      background: var(--accent-gradient);
      width: 50vw;
      height: 50vw;
      top: -20vw;
      left: 25vw;
    }

    /* Header */
    header {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 10;
    }

    .logo-container {
      display: flex;
      align-items: center;
      text-decoration: none;
    }

    .logo-text {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .header-contact {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: var(--transition-smooth);
    }

    .header-contact:hover {
      color: var(--text-primary);
    }

    /* Main Container */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
      text-align: center;
      position: relative;
      z-index: 5;
    }

    /* Hero Branding */
    .hero-brand {
      position: relative;
      margin-bottom: 2rem;
      display: inline-block;
    }

    .hero-logo {
      width: 90px;
      height: 90px;
      border-radius: 22px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      position: relative;
      z-index: 2;
    }

    .hero-logo-glow {
      position: absolute;
      top: -20px;
      left: -20px;
      right: -20px;
      bottom: -20px;
      background: var(--accent-gradient);
      filter: blur(25px);
      opacity: 0.15;
      border-radius: 50%;
      z-index: 1;
      animation: pulseGlow 4s infinite ease-in-out;
    }

    @keyframes pulseGlow {
      0%, 100% { transform: scale(1); opacity: 0.12; }
      50% { transform: scale(1.1); opacity: 0.22; }
    }

    /* Hero Text */
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.9rem;
      background: rgba(15, 23, 42, 0.03);
      border: 1px solid var(--border-color);
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
      letter-spacing: 0.02em;
    }

    .hero-title {
      font-size: clamp(2.25rem, 5vw, 3.5rem);
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
    }

    .text-gradient {
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: clamp(1.05rem, 2vw, 1.2rem);
      color: var(--text-secondary);
      max-width: 620px;
      margin: 0 auto 3rem;
      font-weight: 400;
      line-height: 1.65;
    }

    /* CTA Button Styles */
    .cta-container {
      width: 100%;
      max-width: 480px;
      margin-bottom: 2rem;
      display: flex;
      justify-content: center;
    }

    .btn-cta {
      display: inline-block;
      background: var(--accent-gradient);
      color: white;
      text-decoration: none;
      padding: 0.9rem 2.25rem;
      border-radius: 100px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition-smooth);
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.2);
    }

    .btn-cta:hover {
      box-shadow: 0 4px 25px rgba(14, 165, 233, 0.35);
      transform: translateY(-2px);
    }

    .btn-cta:active {
      transform: translateY(0);
    }

    @keyframes slideIn {
      from { transform: translateY(8px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* Footer */
    footer {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
      border-top: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 10;
    }

    @media (max-width: 480px) {
      footer {
        flex-direction: column;
        gap: 1rem;
        padding-bottom: 3rem;
      }
    }

    .footer-email {
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.9rem;
      transition: var(--transition-smooth);
    }

    .footer-email:hover {
      color: var(--text-primary);
    }

    .copyright {
      font-size: 0.85rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <!-- Magic Sparkles Canvas -->
  <canvas id="magic-canvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999;"></canvas>

  <!-- Ambient Glow Background -->
  <div class="glow-container">
    <div class="glow-blob glow-center"></div>
  </div>

  <!-- Header -->
  <header>
    <div class="logo-container">
      <span class="logo-text">QueesAI</span>
    </div>
    <a href="mailto:contact@queesai.com" class="header-contact">Contact</a>
  </header>

  <!-- Hero Content -->
  <main>
    
    <div class="hero-brand">
      <div class="hero-logo-glow"></div>
      <img src="assets/logo.jpg" alt="QueesAI Logo" class="hero-logo">
    </div>

    <div class="hero-badge">
      <span>✨</span> A Proactive Learning Space
    </div>

    <h1 class="hero-title">
      Learn Science. Master AI.<br>
      <span class="text-gradient">Daily.</span>
    </h1>

    <p class="hero-subtitle">
      QueesAI is a proactive learning space designed to help you master science using AI, while learning the fundamentals of Artificial Intelligence itself.
    </p>

    <!-- Contact CTA -->
    <div class="cta-container">
      <a href="mailto:contact@queesai.com" class="btn-cta" id="cta-button">Contact Us</a>
    </div>

  </main>

  <!-- Footer -->
  <footer>
    <a href="mailto:contact@queesai.com" class="footer-email">contact@queesai.com</a>
    <span class="copyright">&copy; 2026 QueesAI. All rights reserved.</span>
  </footer>

  <!-- Magic Particles & Waitlist Storage Logic -->
  <script>
    // Magic Canvas Effects
    const canvas = document.getElementById('magic-canvas');
    const ctx = canvas.getContext('2d');
    
    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;
    
    window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    });
    
    const particles = [];
    
    class Particle {
      constructor(x, y, isBurst = false) {
        this.x = x;
        this.y = y;
        this.size = Math.random() * 4 + 1.5;
        this.speedX = isBurst ? (Math.random() - 0.5) * 8 : (Math.random() - 0.5) * 2;
        this.speedY = isBurst ? (Math.random() - 0.5) * 8 - 1 : (Math.random() - 0.5) * 1.5 - 0.5;
        // Adjusted for light mode (slightly darker/more saturated pastels)
        this.color = Math.random() > 0.5 
          ? `hsla(${260 + Math.random() * 20}, 85%, 55%, ${Math.random() * 0.6 + 0.4})` 
          : `hsla(${180 + Math.random() * 20}, 85%, 45%, ${Math.random() * 0.6 + 0.4})`;
        this.alpha = 1;
        this.decay = Math.random() * 0.015 + 0.01;
        this.spikes = Math.random() > 0.65 ? 4 : 0; // 4-point star or circle spark
      }
      
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.alpha -= this.decay;
      }
      
      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        
        if (this.spikes === 4) {
          // Draw diamond sparkles (highly performant alternative to stars)
          ctx.beginPath();
          ctx.moveTo(this.x, this.y - this.size * 1.8);
          ctx.lineTo(this.x + this.size * 0.8, this.y);
          ctx.lineTo(this.x, this.y + this.size * 1.8);
          ctx.lineTo(this.x - this.size * 0.8, this.y);
          ctx.closePath();
          ctx.fillStyle = this.color;
          ctx.fill();
        } else {
          // Draw simple circle spark
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fillStyle = this.color;
          ctx.fill();
        }
        
        ctx.restore();
      }
    }
    
    const MAX_PARTICLES = 120;
    
    function createBurst(x, y) {
      for (let i = 0; i < 75; i++) {
        particles.push(new Particle(x, y, true));
      }
      if (particles.length > MAX_PARTICLES) {
        particles.splice(0, particles.length - MAX_PARTICLES);
      }
    }
    
    // Add mouse move listener
    window.addEventListener('mousemove', (e) => {
      if (Math.random() > 0.35) {
        particles.push(new Particle(e.clientX, e.clientY));
      }
      if (particles.length > MAX_PARTICLES) {
        particles.shift();
      }
    });
    
    // Add touch support
    window.addEventListener('touchmove', (e) => {
      if (e.touches.length > 0 && Math.random() > 0.35) {
        particles.push(new Particle(e.touches[0].clientX, e.touches[0].clientY));
      }
      if (particles.length > MAX_PARTICLES) {
        particles.shift();
      }
    });
    
    // Auto-generate minor background sparkles
    setInterval(() => {
      if (particles.length < 12) {
        particles.push(new Particle(
          Math.random() * width, 
          Math.random() * height
        ));
      }
    }, 450);
    
    function animate() {
      ctx.clearRect(0, 0, width, height);
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        if (particles[i].alpha <= 0) {
          particles.splice(i, 1);
        } else {
          particles[i].draw();
        }
      }
      requestAnimationFrame(animate);
    }
    
    animate();

    // Contact Button Sparkle Trigger
    document.getElementById('cta-button').addEventListener('click', function(e) {
      const rect = e.target.getBoundingClientRect();
      const x = rect.left + rect.width / 2;
      const y = rect.top + rect.height / 2;
      createBurst(x, y);
    });
  </script>
</body>
</html>
